<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
    <title>WIPULSCAN PRO</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        body { margin:0; background:#000; overflow:hidden; }
        canvas { position:fixed; top:0; left:0; }

        .main {
            position:fixed; inset:0; display:none; flex-direction:column;
            background: radial-gradient(circle at center, #001122 0%, #000 70%);
        }
        .header {
            height:68px; background:rgba(0,25,45,0.95); border-bottom:1px solid #00ddff;
            display:flex; align-items:center; justify-content:space-between; padding:0 25px;
            font-size:19px; letter-spacing:4px; color:#ccffdd;
        }
        .scan-frame {
            flex:1; margin:22px; border:1px solid #00ddff; border-radius:16px; position:relative;
            overflow:hidden; box-shadow:0 0 60px rgba(0,220,255,0.25);
        }
        .scan-line {
            position:absolute; left:0; right:0; height:3px;
            background:linear-gradient(90deg, transparent, #00ffcc, #00ffcc, transparent);
            box-shadow:0 0 30px #00ffcc;
            animation:scan 3.2s linear infinite;
        }
        @keyframes scan { 0%{top:-10px} 100%{top:100%} }

        .bottom-bar {
            height:72px; background:rgba(0,15,30,0.9); display:flex; align-items:center; justify-content:center;
            gap:40px; font-size:13px; letter-spacing:2px; color:#00bbff;
        }
    </style>
</head>
<body>

<canvas id="ic"></canvas>

<div id="main" class="main">
    <div class="header">
        <span>WIPULSCAN <span style="color:#ffdd88;">PRO</span></span>
        <span style="color:#0f0; font-size:14px;">● SYSTEM ONLINE</span>
    </div>
    
    <div class="scan-frame">
        <div class="scan-line"></div>
    </div>
    
    <div class="bottom-bar">
        <div>V-POOL ACTIVE</div>
        <div>SIGNAL 98.4%</div>
        <div>COBRA-7 PROTOCOL</div>
    </div>
</div>

<script>
function ciDone(){
    document.getElementById('ic').style.opacity = '0';
    setTimeout(() => {
        document.getElementById('main').style.display = 'flex';
    }, 700);
}

window.onload = startIntro;
</script>
</body>
</html>
