<script>
// === FILM-STYLE INTRO – edel, basslastig, cinematic ===

function playCinematicFanfare(){
  if(!CI.ac) return;
  const ac = CI.ac;
  const t = ac.currentTime;

  // Tiefer, warmer Orchestral-Bass
  const bass = ac.createOscillator();
  const bassGain = ac.createGain();
  bass.type = 'sine';
  bass.frequency.setValueAtTime(38, t);
  bass.frequency.exponentialRampToValueAtTime(26, t+2.8);
  bassGain.gain.setValueAtTime(0, t);
  bassGain.gain.linearRampToValueAtTime(1.1, t+0.4);
  bassGain.gain.exponentialRampToValueAtTime(0.001, t+3.6);
  bass.connect(bassGain); bassGain.connect(ac.destination);
  bass.start(t); bass.stop(t+3.8);

  // Schöne, edle Melodie (wie Film-Logo)
  const notes = [0, 4, 7, 12, 16, 19, 24]; // C-Dur Akkorde
  const times = [0.0, 0.65, 1.35, 1.95, 2.45, 2.95, 3.45];

  notes.forEach((note, i) => {
    const osc = ac.createOscillator();
    const gain = ac.createGain();
    osc.type = 'sawtooth';
    osc.frequency.value = 110 * Math.pow(2, note/12); // schöner warmer Ton
    gain.gain.setValueAtTime(0, t + times );
    gain.gain.linearRampToValueAtTime(0.65, t + times + 0.08);
    gain.gain.exponentialRampToValueAtTime(0.001, t + times + 2.8);
    osc.connect(gain); gain.connect(ac.destination);
    osc.start(t + times );
    osc.stop(t + times + 3);
  });

  // Kleiner heller Glanz obendrauf
  setTimeout(() => bellSound(), 420);
}

function ciLoop(now){
  // ... (der Rest bleibt gleich, nur der Fanfare-Aufruf ändert sich)

  if(la > 650 && !CI._playedFan){
    CI._playedFan = true;
    playCinematicFanfare();           // ← neue edle Melodie
  }
}
</script>
