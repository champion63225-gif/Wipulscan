<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#4499ff">
    <title>WIPULSCAN · PRO</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="toast"></div>
    <canvas id="ic"></canvas>
    <div id="intro"></div>

    <!-- ════ TAP GATE ════ -->
    <div id="tapgate" onclick="startIntro()">
      <div class="tgr"></div><div class="tgr"></div><div class="tgr"></div>
      <div class="tg-ico">📶</div>
      <div class="tg-logo">WIPULSCAN<br>PRO</div>
      <div class="tg-sub">COBRA DYNAMICS · 2026</div>
      <div class="tg-tap">◈ &nbsp; TIPPEN ZUM STARTEN &nbsp; ◈</div>
    </div>

<script>
// === NUR TIEFER BASS-HERZSCHLAG – KEIN PIEPSEN ===

let CI = {
  ac: null, ctx: null, running: false, raf: 0, t0: 0,
  irisT: 0, waitTap: false, frags: [], fragsOk: false,
  W: 0, H: 0
};

let BLD = { START: 850, I0: 620, I1: 210, DUR: 1850, next: 0, count: 0, rings: [], logo: false, logoT: 0 };

const CB = 'rgba(0,170,255,';

function eOut3(t){ return 1 - Math.pow(1-t, 3); }
function eIO(t){ return t < 0.5 ? 2*t*t : -1 + (4 - 2*t)*t; }
function eEl(t){
  if(t <= 0 || t >= 1) return t;
  return Math.pow(2, -10*t) * Math.sin((t*10 - 0.75) * Math.PI * 2 / 3) + 1;
}

function wifi(cx, cy, R, col, al, gl){
  if(al <= 0 || R < 2) return;
  const c = CI.ctx, a0 = Math.PI*1.168, a1 = Math.PI*1.832;
  c.save(); c.globalAlpha = al;
  [{r:R,sw:R*0.13},{r:R*0.62,sw:R*0.105},{r:R*0.34,sw:R*0.082}].forEach(ar=>{
    c.save(); c.shadowColor=col; c.shadowBlur=gl*ar.r*0.18;
    c.beginPath(); c.arc(cx,cy,ar.r,a0,a1);
    c.strokeStyle=col; c.lineWidth=ar.sw; c.lineCap='round'; c.stroke(); c.restore();
  });
  c.beginPath(); c.arc(cx,cy+R*0.62,R*0.11,0,Math.PI*2); c.fillStyle=col; c.fill();
  c.restore();
}

function heartBeat(time, strength){
  if(!CI.ac) return;
  const o = CI.ac.createOscillator();
  const g = CI.ac.createGain();
  const f = CI.ac.createBiquadFilter();

  o.type = 'sine';
  o.frequency.setValueAtTime(42, time);
  o.frequency.exponentialRampToValueAtTime(26, time + 0.9);

  f.type = 'lowpass';
  f.frequency.value = 160;

  g.gain.setValueAtTime(0, time);
  g.gain.linearRampToValueAtTime(strength, time + 0.04);
  g.gain.exponentialRampToValueAtTime(0.001, time + 1.2);

  o.connect(f); f.connect(g); g.connect(CI.ac.destination);
  o.start(time); o.stop(time + 1.4);
}

function ciLoop(now){
  if(!CI.running) return;
  CI.raf = requestAnimationFrame(ciLoop);
  const c = CI.ctx, W = CI.W, H = CI.H, t = now - CI.t0;
  const cx = W*0.5, cy = H*0.42, R = Math.min(W,H)*0.42;
  const fs = Math.round(Math.min(W,H)*0.068);

  c.clearRect(0,0,W,H);
  c.fillStyle = '#000'; c.fillRect(0,0,W,H);

  // Nebula
  if(t >= 400){
    const na = Math.min((t-400)/1200, 0.1) + Math.abs(Math.sin(t*0.0018))*0.05;
    const nb = c.createRadialGradient(cx,cy,0,cx,cy,R*2.1);
    nb.addColorStop(0, CB+(na*1.4)+')');
    nb.addColorStop(0.5, CB+(na*0.4)+')');
    nb.addColorStop(1, CB+'0)');
    c.beginPath(); c.arc(cx,cy,R*2.1,0,Math.PI*2); c.fillStyle=nb; c.fill();
  }

  // WiFi Symbol
  let wA = 0, wS = 1, wG = 2;
  if(t >= 400){
    if(t < 1400){
      const p = (t-400)/1000; wA = Math.min(eEl(p)*1.8,1); wS = p*0.98+0.02; wG = p*3;
    } else if(!BLD.logo){
      wA = 0.9 + Math.sin(t*0.003)*0.1;
      wG = 2;
    }
    if(wA > 0) wifi(cx, cy, R * wS, '#00ddff', wA, wG);
  }

  // Logo
  if(!BLD.logo && t >= BLD.START){
    const iv = BLD.I0 * Math.pow(BLD.I1/BLD.I0, Math.min((t-BLD.START)/BLD.DUR,1));
    if(iv <= BLD.I1){
      BLD.logo = true; BLD.logoT = t;
      heartBeat(CI.ac.currentTime, 1.4);
      heartBeat(CI.ac.currentTime + 0.82, 0.95);
    }
  }

  // Logo Text
  if(BLD.logo){
    const la = t - BLD.logoT;
    const tp = Math.min(la/500,1), tsc = 0.3 + eOut3(tp)*0.7, tal = eOut3(tp);
    if(tal > 0.01){
      c.save(); c.translate(cx, cy*0.95); c.scale(tsc, tsc);
      c.shadowColor = '#d4af37'; c.shadowBlur = 32 * tal;
      c.fillStyle = '#f5e070';
      c.font = `700 ${fs}px Cinzel, serif`;
      c.textAlign = 'center'; c.textBaseline = 'middle';
      c.fillText('WIPULSCAN', 0, 0);
      c.restore();
    }
    if(la > 1850){
      CI.waitTap = true;
    }
  }

  if(CI.irisT){
    const ip = Math.min((now - CI.irisT)/1400, 1);
    if(ip >= 1) ciDone();
  }
}

function startIntro(){
  document.getElementById('tapgate').style.display = 'none';
  
  const ic = document.getElementById('ic');
  CI.W = window.innerWidth; CI.H = window.innerHeight;
  const dpr = window.devicePixelRatio || 1;
  ic.width = Math.round(CI.W * dpr);
  ic.height = Math.round(CI.H * dpr);
  ic.style.width = CI.W + 'px';
  ic.style.height = CI.H + 'px';
  CI.ctx = ic.getContext('2d');
  CI.ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

  CI.ac = new (window.AudioContext || window.webkitAudioContext)();
  CI.running = true;
  CI.t0 = performance.now();
  CI.raf = requestAnimationFrame(ciLoop);
}

function ciDone(){
  CI.running = false;
  cancelAnimationFrame(CI.raf);
  document.getElementById('intro').style.display = 'none';
  alert("Willkommen bei WIPULSCAN PRO ✨");
}
</script>
</body>
</html>
