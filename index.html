<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#4499ff">
    <title>WIPULSCAN · PRO</title>
    <link rel="manifest" href="manifest.json">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="toast"></div>
    
    <!-- WICHTIG: Diese zwei Zeilen müssen da sein -->
    <canvas id="ic"></canvas><div id="toast"></div>
    <div id="intro"></div>

    <!-- ════ TAP GATE ════ -->
    <div id="tapgate" onclick="W.tapGo()">
      <div class="tgr"></div><div class="tgr"></div><div class="tgr"></div>
      <div class="tg-ico">📶</div>
      <div class="tg-logo">WIPULSCAN<br>PRO</div>
      <div class="tg-sub">COBRA DYNAMICS · 2026</div>
      <div class="tg-tap">◈ &nbsp; TIPPEN ZUM STARTEN &nbsp; ◈</div>
    </div>

    <!-- Dein ganzer restlicher HTML-Inhalt (intro, consent, camera, sui usw.) kommt hier rein -->
    <!-- (alles, was du mir gerade geschickt hast zwischen <div id="toast"></div> und dem <script>) -->

<script>
// === EDLES CINEMATIC WIPULSCAN INTRO ===

let CI = {
  ac: null, ctx: null, running: false, raf: 0, t0: 0,
  irisT: 0, waitTap: false, frags: [], fragsOk: false, _playedFan: false,
  W: 0, H: 0
};

let BLD = { START: 850, I0: 620, I1: 210, DUR: 1850, next: 0, count: 0, rings: [], logo: false, logoT: 0 };

const CB = 'rgba(0,170,255,';
const CG = 'rgba(255,235,140,';

function eOut3(t){ return 1 - Math.pow(1-t, 3); }
function eIO(t){ return t < 0.5 ? 2*t*t : -1 + (4 - 2*t)*t; }
function eEl(t){
  if(t <= 0 || t >= 1) return t;
  return Math.pow(2, -10*t) * Math.sin((t*10 - 0.75) * Math.PI * 2 / 3) + 1;
}

function wifi(cx, cy, R, col, al, gl){
  if(al <= 0 || R < 2) return;
  const c = CI.ctx, a0 = Math.PI*1.168, a1 = Math.PI*1.832;
  c.save(); c.globalAlpha = al;
  [{r:R, sw:R*0.13}, {r:R*0.62, sw:R*0.105}, {r:R*0.34, sw:R*0.082}].forEach(ar => {
    c.save(); c.shadowColor = col; c.shadowBlur = gl * ar.r * 0.18;
    c.beginPath(); c.arc(cx, cy, ar.r, a0, a1);
    c.strokeStyle = col; c.lineWidth = ar.sw; c.lineCap = 'round'; c.stroke(); c.restore();
  });
  c.beginPath(); c.arc(cx, cy + R*0.62, R*0.11, 0, Math.PI*2);
  c.fillStyle = col; c.fill();
  c.restore();
}

function makeFrags(cx, cy){
  CI.frags = [];
  const cols = ['#d4af37', '#f5e070', '#fff', '#00ddff'];
  for(let i = 0; i < 110; i++){
    const a = Math.random() * Math.PI * 2;
    const sp = 0.8 + Math.random() * 4.2;
    CI.frags.push({
      x: cx, y: cy,
      vx: Math.cos(a) * sp,
      vy: Math.sin(a) * sp - 0.8 - Math.random() * 2.2,
      life: 1, dec: 0.005 + Math.random() * 0.012,
      sz: 1.2 + Math.random() * 4.5,
      col: cols[Math.floor(Math.random() * cols.length)]
    });
  }
}

function bellSound(){
  if(!CI.ac) return;
  try{
    const ac = CI.ac, n = ac.currentTime;
    function bell(f, t, v){
      const o = ac.createOscillator(), g = ac.createGain();
      o.type = 'sine'; o.frequency.value = f;
      g.gain.setValueAtTime(0, n+t);
      g.gain.linearRampToValueAtTime(v, n+t+0.008);
      g.gain.exponentialRampToValueAtTime(0.001, n+t+0.55);
      o.connect(g); g.connect(ac.destination);
      o.start(n+t); o.stop(n+t+0.6);
    }
    bell(880, 0, 0.52); bell(1108.7, 0.14, 0.62);
  }catch(e){}
}

function playCinematicFanfare(){
  if(!CI.ac) return;
  const ac = CI.ac, t = ac.currentTime;

  // Tiefer Bass
  const bass = ac.createOscillator(), bg = ac.createGain();
  bass.type = 'sine';
  bass.frequency.setValueAtTime(38, t);
  bass.frequency.exponentialRampToValueAtTime(24, t+3.4);
  bg.gain.setValueAtTime(0, t);
  bg.gain.linearRampToValueAtTime(1.15, t+0.45);
  bg.gain.exponentialRampToValueAtTime(0.001, t+3.9);
  bass.connect(bg); bg.connect(ac.destination);
  bass.start(t); bass.stop(t+4.2);

  // Edle Melodie
  const notes = [0,4,7,12,16,19,24];
  const times = [0.0,0.65,1.35,1.95,2.45,2.95,3.45];
  notes.forEach((n,i) => {
    const o = ac.createOscillator(), g = ac.createGain();
    o.type = 'sawtooth';
    o.frequency.value = 110 * Math.pow(2, n/12);
    g.gain.setValueAtTime(0, t + times[i]);
    g.gain.linearRampToValueAtTime(0.68, t + times[i] + 0.1);
    g.gain.exponentialRampToValueAtTime(0.001, t + times[i] + 2.9);
    o.connect(g); g.connect(ac.destination);
    o.start(t + times[i]); o.stop(t + times[i] + 3.2);
  });

  setTimeout(() => bellSound(), 420);
}

function bldI(t){
  if(t < BLD.START) return Infinity;
  return BLD.I0 * Math.pow(BLD.I1 / BLD.I0, Math.min((t - BLD.START)/BLD.DUR, 1));
}

function fireBeat(t, iv){
  if(!CI.ac) return;
  try{
    if(CI.ac.state === 'suspended') CI.ac.resume().catch(()=>{});
    const ac = CI.ac, n = ac.currentTime;
    const dur = Math.min(0.48, iv/1000 * 0.68);
    const vol = Math.min(0.92, 0.32 + BLD.count * 0.018);

    const o = ac.createOscillator(), g = ac.createGain();
    o.type = 'sine';
    o.frequency.setValueAtTime(52, n);
    o.frequency.exponentialRampToValueAtTime(18, n + dur);
    g.gain.setValueAtTime(0, n);
    g.gain.linearRampToValueAtTime(vol, n + 0.012);
    g.gain.exponentialRampToValueAtTime(0.001, n + dur + 0.06);
    o.connect(g); g.connect(ac.destination);
    o.start(n); o.stop(n + dur + 0.1);
  }catch(e){}
}

function ciLoop(now){
  if(!CI.running) return;
  CI.raf = requestAnimationFrame(ciLoop);
  const c = CI.ctx, W = CI.W, H = CI.H, t = now - CI.t0;
  const cx = W*0.5, cy = H*0.42, R = Math.min(W,H)*0.42;
  const fs = Math.round(Math.min(W,H)*0.068);

  c.clearRect(0,0,W,H);
  c.fillStyle = '#000'; c.fillRect(0,0,W,H);

  // Nebula
  if(t >= 400){
    const na = Math.min((t-400)/1200, 0.1) + Math.abs(Math.sin(t*0.0018))*0.05;
    const nb = c.createRadialGradient(cx,cy,0,cx,cy,R*2.1);
    nb.addColorStop(0, CB + (na*1.4) + ')');
    nb.addColorStop(0.5, CB + (na*0.4) + ')');
    nb.addColorStop(1, CB + '0)');
    c.beginPath(); c.arc(cx,cy,R*2.1,0,Math.PI*2); c.fillStyle = nb; c.fill();
  }

  // WiFi Symbol
  let wA = 0, wS = 1, wG = 2;
  if(t >= 400){
    if(t < 1400){
      const p = (t-400)/1000; wA = Math.min(eEl(p)*1.8,1); wS = p*0.98+0.02; wG = p*3;
    } else if(!BLD.logo){
      let beatGlow = 0;
      if(BLD.rings.length > 0){
        const lr = BLD.rings[BLD.rings.length-1];
        beatGlow = Math.max(0, 1 - (t - lr.t)/Math.max(lr.iv,60)) * 8;
      }
      wA = 0.9 + Math.sin(t*0.003)*0.1;
      wG = 2 + beatGlow;
    } else {
      wA = Math.max(0, 1 - Math.min((t - BLD.logoT)/800,1) * 3.5);
    }
    if(wA > 0) wifi(cx, cy, R * wS, '#00ddff', wA, wG);
  }

  // Presents Text
  if(t >= 1100 && !BLD.logo){
    const pA = eOut3(Math.min((t-1100)/620,1));
    if(pA > 0.02){
      c.save(); c.globalAlpha = pA * 0.95;
      c.textAlign = 'center'; c.textBaseline = 'middle';
      c.shadowColor = '#d4af37'; c.shadowBlur = 18 * pA;
      c.fillStyle = '#d4af37';
      c.font = `500 ${Math.round(fs*0.33)}px Share Tech Mono,monospace`;
      c.fillText('COBRA DYNAMICS', cx, cy + R*0.79);

      c.shadowColor = '#00ddff'; c.shadowBlur = 24 * pA;
      c.fillStyle = '#a0e0ff';
      c.font = `700 ${Math.round(fs*0.41)}px Share Tech Mono,monospace`;
      c.fillText('P R E S E N T S', cx, cy + R*0.97);
      c.restore();
    }
  }

  // Beat & Logo
  if(!BLD.logo && t >= BLD.START){
    const iv = bldI(t);
    if(!BLD.next) BLD.next = t;
    if(t >= BLD.next){ fireBeat(t, iv); BLD.next = t + iv; }
    if(iv <= BLD.I1){
      BLD.logo = true; BLD.logoT = t;
      playCinematicFanfare();
    }
  }

  // Rings
  BLD.rings = BLD.rings.filter(r => (t - r.t) < r.iv*2.2);
  BLD.rings.forEach(r => {
    const prog = (t - r.t) / Math.max(r.iv*1.8, 80);
    if(prog >= 1) return;
    const expand = eOut3(prog), alpha = (1-prog)*0.6;
    c.beginPath(); c.arc(cx, cy, R*(1 + expand*0.9), 0, Math.PI*2);
    c.strokeStyle = CB + alpha + ')'; c.lineWidth = 4*(1-prog); c.stroke();
  });

  // Logo Text
  if(BLD.logo){
    const la = t - BLD.logoT;
    const tp = Math.min(la/500,1), tsc = 0.3 + eOut3(tp)*0.7, tal = eOut3(tp);
    if(tal > 0.01){
      c.save(); c.translate(cx, cy*0.95); c.scale(tsc, tsc);
      c.shadowColor = '#d4af37'; c.shadowBlur = 32 * tal;
      c.fillStyle = '#f5e070';
      c.font = `700 ${fs}px Cinzel Decorative, serif`;
      c.textAlign = 'center'; c.textBaseline = 'middle';
      c.fillText('WIPULSCAN', 0, 0);
      c.restore();
    }
    if(la > 1850){
      const tpa = Math.min((la-1850)/550,1);
      c.save(); c.globalAlpha = tpa * (0.6 + Math.sin(now*0.0038)*0.4);
      c.fillStyle = '#ffffff';
      c.font = `400 ${Math.round(fs*0.27)}px Share Tech Mono,monospace`;
      c.textAlign = 'center'; c.textBaseline = 'middle';
      c.fillText('▶ TIPPE ZUM STARTEN', cx, cy + R*1.42);
      c.restore();
      CI.waitTap = true;
    }
  }

  // Iris / Ende
  if(CI.irisT){
    const ip = Math.min((now - CI.irisT)/1400, 1);
    if(!CI.fragsOk){ makeFrags(cx, cy*0.95); CI.fragsOk = true; }
    // Frags zeichnen...
    CI.frags.forEach(f => {
      f.x += f.vx; f.y += f.vy; f.vy += 0.038; f.vx *= 0.989; f.life -= f.dec;
      if(f.life <= 0) return;
      c.save(); c.shadowBlur = 5*f.life;
      c.fillStyle = f.col; c.globalAlpha = f.life*0.9;
      c.fillRect(f.x - f.sz*0.5, f.y - f.sz*0.5, f.sz, f.sz);
      c.restore();
    });

    const ir = Math.sqrt(W*W + H*H) * 0.65 * eIO(Math.min(ip*1.04,1));
    c.save(); c.beginPath(); c.rect(0,0,W,H); c.arc(cx, cy*0.95, Math.max(0,ir), 0, Math.PI*2, true);
    c.fillStyle = '#000'; c.fill('evenodd'); c.restore();

    if(ip >= 1) ciDone();
  }
}

function ciStart(){
  const ic = document.getElementById('ic');
  CI.W = window.innerWidth; CI.H = window.innerHeight;
  const dpr = window.devicePixelRatio || 1;
  ic.width = Math.round(CI.W * dpr);
  ic.height = Math.round(CI.H * dpr);
  ic.style.width = CI.W + 'px';
  ic.style.height = CI.H + 'px';
  CI.ctx = ic.getContext('2d');
  CI.ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

  CI.ac = new (window.AudioContext || window.webkitAudioContext)();
  CI.running = true;
  CI.t0 = performance.now();
  CI.raf = requestAnimationFrame(ciLoop);

  // Tap to continue
  const introDiv = document.getElementById('intro');
  function onTap(){ 
    if(CI.waitTap && !CI.irisT) CI.irisT = performance.now(); 
  }
  introDiv.addEventListener('touchend', onTap, {passive:false});
  introDiv.addEventListener('click', onTap);
}

function ciDone(){
  CI.running = false;
  cancelAnimationFrame(CI.raf);
  document.getElementById('intro').style.opacity = '0';
  setTimeout(() => {
    document.getElementById('intro').style.display = 'none';
    // Hier kommt dein Haupt-Programm hin
    alert("Willkommen bei WIPULSCAN PRO ✨");
  }, 600);
}

window.onload = ciStart;
</script>
