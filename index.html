<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
    <title>WIPULSCAN PRO</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        body { margin:0; background:#000; overflow:hidden; }
        canvas { position:fixed; top:0; left:0; }

        .app {
            position:fixed; inset:0; display:none; background:radial-gradient(circle at 50% 20%, #001a33 0%, #000 70%);
            flex-direction:column;
        }
        .header {
            height:78px; background:rgba(0,28,55,0.95); border-bottom:2px solid #00eeff;
            display:flex; align-items:center; justify-content:space-between; padding:0 25px;
            font-family:'Cinzel', serif; font-size:21px; letter-spacing:5px; color:#ddffcc;
            box-shadow:0 4px 30px rgba(0,240,255,0.15);
        }
        .scan {
            flex:1; margin:24px; border:1px solid rgba(0,240,255,0.6); border-radius:18px;
            position:relative; overflow:hidden; box-shadow:0 0 80px rgba(0,220,255,0.4);
        }
        .holo-ring {
            position:absolute; inset:0; border:2px solid #00ffcc; border-radius:18px;
            animation:holo 6s linear infinite;
        }
        @keyframes holo { 0%{transform:rotate(0deg); opacity:0.6} 100%{transform:rotate(360deg); opacity:0.3} }

        .scan-line {
            position:absolute; left:0; right:0; height:4px; background:linear-gradient(90deg, transparent, #00ffdd, transparent);
            box-shadow:0 0 40px #00ffdd; animation:scan 2.4s linear infinite;
        }
        @keyframes scan { 0%{top:-20px} 100%{top:100%} }

        .data {
            position:absolute; bottom:20px; left:20px; color:#00ffcc; font-size:13px; line-height:1.4;
        }
        .bottom {
            height:82px; background:rgba(0,15,35,0.95); display:flex; align-items:center; justify-content:space-around;
            font-size:13px; color:#88eeff; letter-spacing:2px;
        }
    </style>
</head>
<body>

<canvas id="ic"></canvas>

<div id="app" class="app">
    <div class="header">
        <span>WIPULSCAN <span style="color:#ffdd88;">PRO</span></span>
        <span style="color:#00ffaa; font-size:14px;">● QUANTUM LINK ACTIVE</span>
    </div>
    
    <div class="scan">
        <div class="holo-ring"></div>
        <div class="holo-ring" style="animation-delay:2s"></div>
        <div class="scan-line"></div>
        <div class="data">
            V-POOL SIGNAL<br>
            <span style="font-size:24px;color:#fff">98.7%</span><br>
            COBRA-9 PROTOCOL
        </div>
    </div>
    
    <div class="bottom">
        <div>SCAN</div>
        <div>ANALYZER</div>
        <div>HISTORY</div>
    </div>
</div>

<script>
function ciDone(){
    document.getElementById('ic').style.opacity = '0';
    setTimeout(() => {
        document.getElementById('app').style.display = 'flex';
    }, 800);
}

window.onload = startIntro;
</script>
</body>
</html>
