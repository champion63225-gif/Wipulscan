<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
    <title>WIPULSCAN · PRO</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        body { margin:0; padding:0; background:#000; overflow:hidden; font-family:'Share Tech Mono', monospace; }
        canvas { position:fixed; top:0; left:0; width:100%; height:100%; }
        #tapgate {
            position:fixed; inset:0; z-index:10; display:flex; flex-direction:column;
            align-items:center; justify-content:center; color:#fff; background:#050a18;
        }
        .tg-logo { font-family:'Cinzel', serif; font-size:52px; font-weight:900; letter-spacing:8px;
                   background:linear-gradient(#d4af37, #fff); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
    </style>
</head>
<body>

<div id="tapgate" onclick="startIntro()">
    <div class="tg-logo">WIPULSCAN</div>
    <div class="tg-logo" style="font-size:32px;margin-top:-15px;">PRO</div>
    <div style="margin-top:80px; font-size:13px; letter-spacing:4px; color:#d4af37;">COBRA DYNAMICS · 2026</div>
    <div style="margin-top:60px; font-size:12px; color:#00aaff;">◈ TIPPEN ZUM STARTEN ◈</div>
</div>

<canvas id="ic"></canvas>

<script>
// ====================== EDLES INTRO MIT HERZSCHLAG ======================
let CI = { ac:null, ctx:null, running:false, raf:0, t0:0, irisT:0, W:0, H:0 };
let BLD = { START:650, I0:680, I1:220, DUR:2100, next:0, logo:false, logoT:0 };

const CB = 'rgba(0,170,255,';

function eOut3(t){return 1-Math.pow(1-t,3);}
function eEl(t){if(t<=0||t>=1)return t; return Math.pow(2,-10*t)*Math.sin((t*10-0.75)*Math.PI*2/3)+1;}

function wifi(cx,cy,R,al){
  if(al<=0) return;
  const c=CI.ctx, a0=Math.PI*1.17, a1=Math.PI*1.83;
  c.save(); c.globalAlpha=al;
  [{r:R,sw:R*0.14},{r:R*0.64,sw:R*0.11},{r:R*0.36,sw:R*0.085}].forEach(a=>{
    c.shadowBlur = 22; c.shadowColor = '#00ddff';
    c.beginPath(); c.arc(cx,cy,a.r,a0,a1);
    c.strokeStyle='#00ddff'; c.lineWidth=a.sw; c.lineCap='round'; c.stroke();
  });
  c.shadowBlur=0;
  c.beginPath(); c.arc(cx,cy+R*0.64,R*0.115,0,Math.PI*2);
  c.fillStyle='#00ddff'; c.fill();
  c.restore();
}

function heartBeat(time, vol){
  if(!CI.ac) return;
  const o = CI.ac.createOscillator();
  const g = CI.ac.createGain();
  const f = CI.ac.createBiquadFilter();
  
  o.type = 'sine';
  o.frequency.setValueAtTime(46, time);
  o.frequency.exponentialRampToValueAtTime(24, time+0.85);
  
  f.type = 'lowpass'; f.frequency.value = 140;
  
  g.gain.setValueAtTime(0, time);
  g.gain.linearRampToValueAtTime(vol, time+0.035);
  g.gain.exponentialRampToValueAtTime(0.001, time+1.15);
  
  o.connect(f); f.connect(g); g.connect(CI.ac.destination);
  o.start(time); o.stop(time+1.3);
}

function ciLoop(now){
  if(!CI.running) return;
  CI.raf = requestAnimationFrame(ciLoop);
  const c=CI.ctx, t=now-CI.t0, W=CI.W, H=CI.H;
  const cx=W*0.5, cy=H*0.43, R=Math.min(W,H)*0.38;

  c.fillStyle='#000'; c.fillRect(0,0,W,H);

  // Nebula
  if(t>300){
    const a = Math.min((t-300)/900,0.09) + Math.abs(Math.sin(t*0.002))*0.04;
    let grad = c.createRadialGradient(cx,cy,0,cx,cy,R*2.4);
    grad.addColorStop(0,CB+(a*1.6)+')');
    grad.addColorStop(1,CB+'0)');
    c.fillStyle=grad; c.fillRect(0,0,W,H);
  }

  // WiFi + Herzschlag im Takt
  if(t>380){
    const pulse = t<1500 ? eEl(Math.min((t-380)/1100,1)) : (0.7 + Math.sin(t*0.006)*0.3);
    
    if(t>BLD.START && !BLD.logo){
      const iv = BLD.I0 * Math.pow(BLD.I1/BLD.I0, Math.min((t-BLD.START)/BLD.DUR,1));
      if(!BLD.next || t > BLD.next){
        heartBeat(CI.ac.currentTime, 1.35);
        BLD.next = t + iv;
      }
    }
    
    wifi(cx, cy, R*pulse, pulse);
  }

  // Cobra Dynamics Presents
  if(t>1150 && !BLD.logo){
    const a = eOut3(Math.min((t-1150)/680,1));
    c.globalAlpha = a*0.95;
    c.shadowBlur = 25; c.shadowColor = '#d4af37';
    c.fillStyle = '#d4af37';
    c.font = '500 19px Share Tech Mono';
    c.textAlign='center';
    c.fillText('COBRA DYNAMICS', cx, cy + R*0.82);
    
    c.shadowColor = '#00aaff';
    c.fillStyle = '#88ddff';
    c.font = '700 21px Share Tech Mono';
    c.fillText('PRESENTS', cx, cy + R*1.02);
    c.globalAlpha = 1;
  }

  // WIPULSCAN PRO kommt aus der Mitte
  if(BLD.logo){
    const la = t - BLD.logoT;
    const scale = 0.2 + eOut3(Math.min(la/620,1))*0.8;
    const alpha = eOut3(Math.min(la/450,1));
    
    c.save();
    c.translate(cx, cy*0.92);
    c.scale(scale, scale);
    c.shadowBlur = 45; c.shadowColor = '#f0d070';
    c.fillStyle = '#f0d070';
    c.font = '900 68px Cinzel';
    c.textAlign='center';
    c.textBaseline='middle';
    c.globalAlpha = alpha;
    c.fillText('WIPULSCAN', 0, 0);
    c.restore();
  }

  if(t > 3900 && !CI.irisT) CI.irisT = now;
  
  if(CI.irisT){
    const p = Math.min((now-CI.irisT)/1300,1);
    const radius = Math.sqrt(W*W+H*H)*0.72 * eIO(p);
    c.save();
    c.beginPath(); c.rect(0,0,W,H);
    c.arc(cx, cy*0.92, Math.max(0,radius), 0, Math.PI*2, true);
    c.fillStyle = '#000'; c.fill('evenodd');
    c.restore();
    
    if(p >= 1) ciDone();
  }
}

function startIntro(){
  document.getElementById('tapgate').style.opacity = '0';
  setTimeout(()=>{ document.getElementById('tapgate').style.display = 'none'; }, 600);

  const canvas = document.getElementById('ic');
  CI.W = window.innerWidth; CI.H = window.innerHeight;
  const dpr = window.devicePixelRatio || 1;
  canvas.width = CI.W * dpr; canvas.height = CI.H * dpr;
  canvas.style.width = CI.W + 'px';
  CI.ctx = canvas.getContext('2d');
  CI.ctx.setTransform(dpr,0,0,dpr,0,0);

  CI.ac = new (window.AudioContext || window.webkitAudioContext)();
  CI.running = true;
  CI.t0 = performance.now();
  requestAnimationFrame(ciLoop);
}

function ciDone(){
  CI.running = false;
  document.getElementById('intro').style.display = 'none';
  alert("✅ Willkommen in WIPULSCAN PRO");
  // Hier kommt später dein eigentlicher App-Content hin
}
</script>
</body>
</html>
