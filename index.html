<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
    <title>WIPULSCAN · PRO</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        body { margin:0; background:#000; overflow:hidden; }
        canvas { position:fixed; top:0; left:0; width:100%; height:100%; }
        #tapgate {
            position:fixed; inset:0; z-index:10; background:#02060f;
            display:flex; flex-direction:column; align-items:center; justify-content:center;
            color:#fff; cursor:pointer;
        }
        .tg-logo { font-family:'Cinzel', serif; font-size:62px; font-weight:900; letter-spacing:10px;
                   background:linear-gradient(#ffe38c, #ffffff); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
    </style>
</head>
<body>

<div id="tapgate" onclick="startIntro()">
    <div class="tg-logo">WIPULSCAN</div>
    <div class="tg-logo" style="font-size:38px;margin-top:-22px;">PRO</div>
    <div style="margin-top:85px; font-size:14px; letter-spacing:6px; color:#00bbff;">COBRA DYNAMICS · 2026</div>
    <div style="margin-top:110px; font-size:13px; color:#00ddff;">◈ TIPPEN ZUM STARTEN ◈</div>
</div>

<canvas id="ic"></canvas>

<script>
// ====================== INTRO BLEIBT – DANACH KOMMT DIE APP ======================

let CI = { ac:null, ctx:null, running:false, raf:0, t0:0, W:0, H:0 };
let phase = 0;

function heartbeat(t, vol){
  if(!CI.ac) return;
  const o = CI.ac.createOscillator();
  const g = CI.ac.createGain();
  const f = CI.ac.createBiquadFilter();
  o.type = 'sine'; o.frequency.setValueAtTime(44, t);
  o.frequency.exponentialRampToValueAtTime(23, t+1.0);
  f.type = 'lowpass'; f.frequency.value = 125;
  g.gain.setValueAtTime(0, t);
  g.gain.linearRampToValueAtTime(vol, t+0.04);
  g.gain.exponentialRampToValueAtTime(0.001, t+1.35);
  o.connect(f); f.connect(g); g.connect(CI.ac.destination);
  o.start(t); o.stop(t+1.5);
}

function ciLoop(now){
  if(!CI.running) return;
  CI.raf = requestAnimationFrame(ciLoop);
  const t = now - CI.t0;
  const c = CI.ctx, W = CI.W, H = CI.H;
  const cx = W*0.5, cy = H*0.46, R = Math.min(W,H)*0.39;

  c.fillStyle = '#000'; c.fillRect(0,0,W,H);

  const pulse = 0.7 + Math.sin(t*0.0036)*0.3;
  if(phase === 0){
    if(t > 800 && (t % 760 < 45)) heartbeat(CI.ac.currentTime, 1.32);

    c.save(); c.globalAlpha = pulse;
    [{r:R*1.1,sw:R*0.15},{r:R*0.68,sw:R*0.115},{r:R*0.39,sw:R*0.09}].forEach(a=>{
      c.shadowBlur = 42; c.shadowColor = '#00eeff';
      c.beginPath(); c.arc(cx,cy,a.r,Math.PI*1.14,Math.PI*1.86);
      c.strokeStyle = '#00eeff'; c.lineWidth = a.sw; c.stroke();
    });
    c.restore();

    if(t > 3100){
      phase = 1;
      CI.logoT = now;
    }
  }

  if(phase === 1){
    const p = Math.min((t - CI.logoT)/820, 1);
    const s = 0.2 + (1 - Math.pow(1-p,3))*0.85;
    c.save(); c.translate(cx, cy*0.93); c.scale(s,s);
    c.shadowBlur = 68; c.shadowColor = '#ffe38c';
    c.fillStyle = '#ffe38c';
    c.font = '900 82px Cinzel';
    c.textAlign = 'center';
    c.fillText('WIPULSCAN', 0, 0);
    c.restore();

    if(p > 0.95){
      setTimeout(finishIntro, 600);
    }
  }
}

function finishIntro(){
  CI.running = false;
  cancelAnimationFrame(CI.raf);
  document.getElementById('ic').style.opacity = '0';

  setTimeout(() => {
    // === AB HIER KOMMT DEINE EIGENTLICHE APP ===
    document.body.innerHTML = `
      <div style="position:fixed; inset:0; background:#001122; color:#00ffcc; display:flex; align-items:center; justify-content:center; font-size:28px; font-family:Arial;">
        <div>
          <h1>WIPULSCAN PRO</h1>
          <p style="font-size:18px; margin-top:20px;">App ist jetzt gestartet</p>
          <p style="margin-top:40px; font-size:16px;">V-Pool Scan bereit</p>
        </div>
      </div>
    `;
  }, 800);
}

function startIntro(){
  document.getElementById('tapgate').style.opacity = '0';
  setTimeout(() => document.getElementById('tapgate').style.display = 'none', 800);

  const canvas = document.getElementById('ic');
  CI.W = window.innerWidth; CI.H = window.innerHeight;
  const dpr = window.devicePixelRatio || 1;
  canvas.width = CI.W * dpr; canvas.height = CI.H * dpr;
  canvas.style.width = CI.W + 'px';
  CI.ctx = canvas.getContext('2d');
  CI.ctx.setTransform(dpr,0,0,dpr,0,0);

  CI.ac = new (window.AudioContext || window.webkitAudioContext)();
  CI.running = true;
  CI.t0 = performance.now();
  requestAnimationFrame(ciLoop);
}
</script>
</script>
</body>
</html>
