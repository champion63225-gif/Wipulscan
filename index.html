<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
    <title>WIPULSCAN PRO</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        body { margin:0; background:#000; overflow:hidden; }
        canvas { position:fixed; top:0; left:0; }

        .app {
            position:fixed; inset:0; display:none; flex-direction:column;
            background: radial-gradient(circle at 50% 25%, #001122 10%, #000 80%);
        }
        .header {
            height:82px; background:rgba(0,28,55,0.97); border-bottom:2px solid #00eeff;
            display:flex; align-items:center; justify-content:space-between; padding:0 30px;
            font-family:'Cinzel', serif; font-size:24px; letter-spacing:8px; color:#ddffcc;
            box-shadow:0 8px 50px rgba(0,255,255,0.25);
        }
        .scan {
            flex:1; margin:28px; border:2px solid rgba(0,255,220,0.6); border-radius:22px;
            position:relative; overflow:hidden; box-shadow:0 0 110px rgba(0,255,200,0.4);
        }
        .holo { position:absolute; inset:0; border:3px solid #00ffcc; border-radius:22px;
                 opacity:0.35; animation:holo 8s linear infinite; }
        @keyframes holo { from { transform:rotate(0deg); } to { transform:rotate(360deg); } }

        .scan-line {
            position:absolute; left:0; right:0; height:5px;
            background:linear-gradient(90deg, transparent, #00ffdd, #00ffdd, transparent);
            box-shadow:0 0 60px #00ffdd; animation:scan 2s linear infinite;
        }
        @keyframes scan { 0%{top:-50px} 100%{top:100%} }

        .center {
            position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
            text-align:center; color:#fff; font-size:18px; letter-spacing:6px;
            text-shadow:0 0 30px #00ffdd;
        }
        .bottom {
            height:90px; background:rgba(0,18,40,0.95); display:flex; align-items:center; justify-content:space-around;
            font-size:15px; color:#88eeff; letter-spacing:3px;
        }
    </style>
</head>
<body>

<canvas id="ic"></canvas>

<div id="app" class="app">
    <div class="header">
        <span>WIPULSCAN <span style="color:#ffdd88;">PRO</span></span>
        <span style="color:#00ffbb; font-size:15px;">● COBRA CORE ACTIVE</span>
    </div>
    
    <div class="scan">
        <div class="holo"></div>
        <div class="holo" style="animation-delay:3s; opacity:0.2"></div>
        <div class="scan-line"></div>
        
        <div class="center">
            V-POOL<br>
            <span style="font-size:52px; color:#ddffcc;">SCANNING</span>
        </div>
    </div>
    
    <div class="bottom">
        <div>ANALYZER</div>
        <div>SPECTRUM</div>
        <div>HISTORY</div>
    </div>
</div>

<script>
function ciDone(){
    document.getElementById('ic').style.opacity = '0';
    setTimeout(() => {
        document.getElementById('app').style.display = 'flex';
    }, 800);
}

window.onload = startIntro;
</script>
</body>
</html>
