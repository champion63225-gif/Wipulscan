<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#4499ff">
    <title>WIPULSCAN · PRO</title>
    <link rel="manifest" href="manifest.json">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="toast"></div>

    <!-- ════ TAP GATE ════ -->
    <div id="tapgate" onclick="W.tapGo()">
      <div class="tgr"></div><div class="tgr"></div><div class="tgr"></div>
      <div class="tg-ico">📶</div>
      <div class="tg-logo">WIPULSCAN<br>PRO</div>
      <div class="tg-sub">COBRA DYNAMICS · 2026</div>
      <div class="tg-tap">◈ &nbsp; TIPPEN ZUM STARTEN &nbsp; ◈</div>
    </div>

    <!-- Dein ganzer restlicher HTML-Inhalt (intro, consent, camera, sui usw.) kommt hier rein -->
    <!-- (alles, was du mir gerade geschickt hast zwischen <div id="toast"></div> und dem <script>) -->

    <script type="module" src="app.js"></script>
</body>
</html>
<!-- SCANNER UI -->
<div id="sui" style="display:none;">
  <div id="topbar">
    <div class="tbico">📶</div>
    <span class="tbtitle">SIGNAL-<br>SCANNER</span>
    <div class="tblive"><div class="tbdot"></div>LIVE</div>
    <button class="tbclose" onclick="W.stopScan()">✕</button>
  </div>
  
  <div id="ga">
    <canvas id="gc"></canvas>
    <div id="sbadge"></div>
  </div>

  <div id="bottom">
    <div id="qstrip"><span id="qsl">—</span><span id="qsd">— dBm</span></div>
    <div id="stats">
      <div class="stat"><div class="sv" id="vping">—</div><div class="sl">PING</div></div>
      <div class="stat"><div class="sv" id="vjit">—</div><div class="sl">JITTER</div></div>
      <div class="stat"><div class="sv" id="vbest" style="color:var(--green)">—</div><div class="sl">BEST</div></div>
    </div>
    <button id="bstart" onclick="W.toggleScan()"><span id="bl">SCANNEN</span></button>
  </div>
</div>
