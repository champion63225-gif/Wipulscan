<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
    <title>WIPULSCAN PRO</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        body { margin:0; background:#000; overflow:hidden; }
        canvas { position:fixed; top:0; left:0; }

        .app {
            position:fixed; inset:0; display:none; background:radial-gradient(circle at 50% 15%, #001122 0%, #000511 80%);
            flex-direction:column;
        }
        .header {
            height:82px; background:rgba(0,20,40,0.96); border-bottom:2px solid #00eeff;
            display:flex; align-items:center; justify-content:space-between; padding:0 28px;
            font-family:'Cinzel', serif; font-size:23px; letter-spacing:6px; color:#ddffcc;
            box-shadow:0 4px 40px rgba(0,255,255,0.15);
        }
        .scan {
            flex:1; margin:25px; border:1px solid rgba(0,255,220,0.5); border-radius:22px;
            position:relative; overflow:hidden; box-shadow:0 0 90px rgba(0,240,255,0.35);
            background:rgba(0,10,30,0.6);
        }
        .holo {
            position:absolute; inset:0; border:2px solid #00ffcc; border-radius:22px;
            opacity:0.4; animation:holo-rotate 7s linear infinite;
        }
        @keyframes holo-rotate { 0%{transform:rotate(0deg)} 100%{transform:rotate(360deg)} }

        .scan-line {
            position:absolute; left:0; right:0; height:4px; background:linear-gradient(90deg, transparent, #00ffdd, #00ffdd, transparent);
            box-shadow:0 0 45px #00ffdd; animation:scan 2.2s linear infinite;
        }
        @keyframes scan { 0%{top:-30px} 100%{top:100%} }

        .center-text {
            position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
            text-align:center; color:#00ffdd; font-size:15px; letter-spacing:5px;
            text-shadow:0 0 30px #00ffdd;
        }
        .bottom {
            height:88px; background:rgba(0,15,35,0.95); display:flex; align-items:center; justify-content:space-around;
            font-size:14px; color:#88eeff;
        }
    </style>
</head>
<body>

<canvas id="ic"></canvas>

<div id="app" class="app">
    <div class="header">
        <span>WIPULSCAN <span style="color:#ffdd88;">PRO</span></span>
        <span style="color:#00ffbb;">● QUANTUM CORE ONLINE</span>
    </div>
    
    <div class="scan">
        <div class="holo"></div>
        <div class="holo" style="animation-delay:2.3s; opacity:0.25"></div>
        <div class="scan-line"></div>
        
        <div class="center-text">
            V-POOL<br>
            <span style="font-size:42px; color:#fff; letter-spacing:8px;">SCANNING</span>
        </div>
    </div>
    
    <div class="bottom">
        <div>ANALYZER</div>
        <div>HISTORY</div>
        <div>SPECTRUM</div>
    </div>
</div>

<script>
function ciDone(){
    document.getElementById('ic').style.opacity = '0';
    setTimeout(() => {
        document.getElementById('app').style.display = 'flex';
    }, 900);
}

// Dein Intro wird automatisch gestartet
window.onload = startIntro;
</script>
</body>
</html>
